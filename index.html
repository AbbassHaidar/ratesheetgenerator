<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Ratesheet Manager</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    color:#333;
}

.container{
    max-width:1700px;
    margin:auto;
}

.header{
    margin-bottom:20px;
}

.header h1{
    margin:0;
    color:#ff7a00;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.stat-title{
    font-size:13px;
    color:#666;
    margin-bottom:8px;
}

.stat-value{
    font-size:28px;
    font-weight:bold;
    color:#ff7a00;
}

.layout{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:1200px){

    .layout{
        grid-template-columns:1fr;
    }

}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

.card h2{
    margin-top:0;
    color:#ff7a00;
}

.row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.field{
    flex:1;
    min-width:220px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    font-size:14px;
}

input,
button,
select{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#ff7a00;
}

button{
    background:#ff7a00;
    color:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#e56d00;
}

.secondary{
    background:#666;
}

.secondary:hover{
    background:#444;
}

.danger{
    background:#cc0000;
}

.danger:hover{
    background:#aa0000;
}

.small{
    font-size:12px;
    color:#777;
    margin-top:5px;
}

.status{
    margin-top:8px;
    color:green;
    font-size:13px;
}

.match-box{
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:10px;
    max-height:400px;
    overflow:auto;
    background:#fafafa;
}

.match-item{
    padding:12px;
    border-bottom:1px solid #eee;
}

.match-item:last-child{
    border-bottom:none;
}

.match-zone{
    font-weight:bold;
    margin-bottom:4px;
}

.badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:20px;
    background:#ffe7d1;
    color:#d66500;
    font-size:11px;
    margin-top:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
}

th{
    background:#fafafa;
}

.action-btn{
    width:auto;
    padding:8px 12px;
    font-size:12px;
}

.highlight{
    background:yellow;
    font-weight:bold;
}

.preview-input{
    width:80px;
    padding:6px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Voice Ratesheet Manager</h1>
</div>

<div class="stats">

<div class="stat-card">
<div class="stat-title">Loaded Routes</div>
<div class="stat-value" id="routesCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Added Rows</div>
<div class="stat-value" id="addedCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Saved Exceptions</div>
<div class="stat-value" id="exceptionsCount">0</div>
</div>

</div>

<div class="layout">

<div>

<div class="card">

<h2>Files</h2>

<div class="row">

<div class="field">
<label>Master Code List</label>
<input type="file" id="masterFile" accept=".xlsx,.xls,.csv">
<div class="small">
Column A = Code<br>
Column B = Destination
</div>
</div>

<div class="field">
<label>Export Template</label>
<input type="file" id="templateFile" accept=".xlsx,.xls">
<div class="status" id="templateStatus"></div>
</div>

</div>

</div>

<div class="card">

<h2>Add Routes</h2>

<div class="row">

<div class="field">
<label>Search</label>
<input type="text" id="searchBox" placeholder="sudan mobile zain">
</div>

<div class="field">
<label>Rate</label>
<input type="number" step="0.000001" id="rate">
</div>

<div class="field">
<label>Effective Date</label>
<input type="date" id="effectiveDate">
</div>

</div>

<div class="row" style="margin-top:15px;">

<div class="field">
<label>Quick Date</label>
<select id="quickDate">
<option value="0">Today</option>
<option value="1">Tomorrow</option>
<option value="7">+7 Days</option>
</select>
</div>

<div class="field">
<label>Initial</label>
<input type="number" id="initialPeriod" value="1">
</div>

<div class="field">
<label>Recurring</label>
<input type="number" id="recurringPeriod" value="1">
</div>

</div>

<div class="match-box" id="matchBox"></div>

<div class="row" style="margin-top:15px;">

<div class="field">
<button id="addBtn">Add All Matched</button>
</div>

<div class="field">
<button class="secondary" id="clearMatchesBtn">
Clear Matches
</button>
</div>

</div>

</div>

</div>

<div>

<div class="card">

<h2>Preview</h2>

<table>

<thead>
<tr>
<th>Destination</th>
<th>Codes Preview</th>
<th>Rate</th>
<th>Date</th>
<th>Init</th>
<th>Rec</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="previewBody"></tbody>

</table>

<div class="row" style="margin-top:15px;">

<div class="field">
<button id="exportBtn">Generate XLSX</button>
</div>

<div class="field">
<button class="danger" id="clearAllBtn">
Clear All
</button>
</div>

</div>

</div>

<div class="card">

<h2>Period Exceptions</h2>

<table>

<thead>
<tr>
<th>Zone</th>
<th>Initial</th>
<th>Recurring</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="exceptionsBody"></tbody>

</table>

</div>

</div>

</div>

</div>

<script>

let masterData = [];
let matchedRows = [];
let exportRows = [];
let templateWorkbook = null;
let zonePeriods = {};

function updateStats(){

    document.getElementById('routesCount').innerText =
        masterData.length;

    document.getElementById('addedCount').innerText =
        exportRows.length;

    document.getElementById('exceptionsCount').innerText =
        Object.keys(zonePeriods).length;
}

function setDate(days=0){

    const d = new Date();

    d.setDate(d.getDate()+days);

    document.getElementById('effectiveDate').value =
        d.toISOString().split('T')[0];
}

setDate(0);

function formatDate(dateString){

    const d = new Date(dateString);

    const mm = String(d.getMonth()+1).padStart(2,'0');

    const dd = String(d.getDate()).padStart(2,'0');

    const yyyy = d.getFullYear();

    return `${mm}/${dd}/${yyyy} 00:00`;
}

function saveMasterList(data){

    localStorage.setItem(
        'masterData',
        JSON.stringify(data)
    );
}

function loadMasterList(){

    const data = localStorage.getItem('masterData');

    if(data){

        masterData = JSON.parse(data);
    }

    updateStats();
}

function saveTemplate(data,name){

    const binary = Array.from(new Uint8Array(data));

    localStorage.setItem(
        'templateData',
        JSON.stringify(binary)
    );

    localStorage.setItem(
        'templateName',
        name
    );
}

function loadTemplate(){

    const data = localStorage.getItem('templateData');

    if(!data) return;

    const uint = new Uint8Array(JSON.parse(data));

    templateWorkbook = XLSX.read(uint,{type:'array'});

    document.getElementById('templateStatus').innerText =
        'Loaded: ' +
        localStorage.getItem('templateName');
}

function loadZonePeriods(){

    const data = localStorage.getItem('zonePeriods');

    if(data){

        zonePeriods = JSON.parse(data);
    }

    renderExceptions();

    updateStats();
}

function saveZonePeriod(zone,initial,recurring){

    if(
        Number(initial) === 1 &&
        Number(recurring) === 1
    ){

        delete zonePeriods[zone.toLowerCase()];

    }else{

        zonePeriods[zone.toLowerCase()] = {

            initial,
            recurring
        };
    }

    localStorage.setItem(
        'zonePeriods',
        JSON.stringify(zonePeriods)
    );

    renderExceptions();

    updateStats();
}

function renderMatches(){

    const box =
        document.getElementById('matchBox');

    if(matchedRows.length === 0){

        box.innerHTML =
            '<div class="match-item">No matches</div>';

        return;
    }

    const searchValue =
        document.getElementById('searchBox')
        .value
        .toLowerCase();

    const tokens =
        searchValue
        .split(' ')
        .filter(t=>t);

    let html = '';

    matchedRows.slice(0,500).forEach(row=>{

        let zoneDisplay = row.zone;

        tokens.forEach(token=>{

            const regex =
                new RegExp(`(${token})`,'ig');

            zoneDisplay =
                zoneDisplay.replace(
                    regex,
                    '<span class="highlight">$1</span>'
                );
        });

        const saved =
            zonePeriods[row.zone.toLowerCase()];

        html += `
        <div class="match-item">

            <div class="match-zone">
                ${zoneDisplay}
            </div>

            <div>
                Code: ${row.code}
            </div>

            ${
                saved
                ?
                `<div class="badge">
                    Saved Period:
                    ${saved.initial}/${saved.recurring}
                </div>`
                :
                ''
            }

        </div>
        `;
    });

    box.innerHTML = html;
}

function renderPreview(){

    const body =
        document.getElementById('previewBody');

    let grouped = {};

    exportRows.forEach(r=>{

        const key = r.zone;

        if(!grouped[key]){

            grouped[key] = {

                zone:r.zone,

                codes:[],

                rate:r.rate,

                effectiveDate:r.effectiveDate,

                initial:r.initial,

                recurring:r.recurring
            };
        }

        grouped[key].codes.push(r.code);

    });

    let html = '';

    Object.values(grouped).forEach(group=>{

        html += `
        <tr>

            <td>${group.zone}</td>

            <td>

                ${group.codes.slice(0,5).join(', ')}

                ${
                    group.codes.length > 5
                    ?
                    `... +${group.codes.length - 5} more`
                    :
                    ''
                }

            </td>

            <td>

                <input
                    class="preview-input"
                    value="${group.rate}"
                    onchange="updateGroupedRows(
                        '${group.zone}',
                        'rate',
                        this.value
                    )"
                >

            </td>

            <td>${group.effectiveDate}</td>

            <td>

                <input
                    class="preview-input"
                    value="${group.initial}"
                    onchange="updateGroupedPeriods(
                        '${group.zone}',
                        'initial',
                        this.value
                    )"
                >

            </td>

            <td>

                <input
                    class="preview-input"
                    value="${group.recurring}"
                    onchange="updateGroupedPeriods(
                        '${group.zone}',
                        'recurring',
                        this.value
                    )"
                >

            </td>

            <td>

                <button
                    class="danger action-btn"
                    onclick="deleteGroupedRows('${group.zone}')"
                >
                    Delete
                </button>

            </td>

        </tr>
        `;
    });

    body.innerHTML = html;

    updateStats();
}

function renderExceptions(){

    const body =
        document.getElementById('exceptionsBody');

    let html = '';

    Object.keys(zonePeriods).forEach(zone=>{

        const p = zonePeriods[zone];

        html += `
        <tr>

            <td>${zone}</td>

            <td>${p.initial}</td>

            <td>${p.recurring}</td>

            <td>

                <button
                    class="action-btn"
                    onclick="editException('${zone}')"
                >
                    Edit
                </button>

                <button
                    class="danger action-btn"
                    onclick="deleteException('${zone}')"
                >
                    Delete
                </button>

            </td>

        </tr>
        `;
    });

    body.innerHTML = html;
}

function editException(zone){

    const initial =
        prompt(
            'Initial Period',
            zonePeriods[zone].initial
        );

    const recurring =
        prompt(
            'Recurring Period',
            zonePeriods[zone].recurring
        );

    if(initial && recurring){

        saveZonePeriod(
            zone,
            initial,
            recurring
        );
    }
}

function deleteException(zone){

    delete zonePeriods[zone];

    localStorage.setItem(
        'zonePeriods',
        JSON.stringify(zonePeriods)
    );

    renderExceptions();

    updateStats();
}

function updateGroupedRows(zone,key,value){

    exportRows.forEach(r=>{

        if(r.zone === zone){

            r[key] = value;
        }

    });
}

function updateGroupedPeriods(zone,key,value){

    exportRows.forEach(r=>{

        if(r.zone === zone){

            r[key] = value;
        }

    });

    const row =
        exportRows.find(r=>r.zone === zone);

    saveZonePeriod(

        zone,

        row.initial,

        row.recurring
    );

    renderExceptions();
}

function deleteGroupedRows(zone){

    exportRows =
        exportRows.filter(r=>

            r.zone !== zone

        );

    renderPreview();
}

window.updateGroupedRows =
    updateGroupedRows;

window.updateGroupedPeriods =
    updateGroupedPeriods;

window.deleteGroupedRows =
    deleteGroupedRows;

window.editException = editException;

window.deleteException = deleteException;

loadMasterList();
loadTemplate();
loadZonePeriods();

document.getElementById('quickDate')
.addEventListener('change',function(){

    setDate(parseInt(this.value));
});

document.getElementById('masterFile')
.addEventListener('change',async function(e){

    const file = e.target.files[0];

    if(!file) return;

    const data = await file.arrayBuffer();

    const workbook = XLSX.read(data);

    const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

    const raw =
        XLSX.utils.sheet_to_json(sheet,{
            header:1
        });

    masterData = [];

    raw.forEach((row,index)=>{

        if(index === 0) return;

        if(!row[0] || !row[1]) return;

        masterData.push({

            code:String(row[0]).trim(),

            zone:String(row[1]).trim()

        });
    });

    saveMasterList(masterData);

    updateStats();

    alert('Master list loaded successfully');
});

document.getElementById('templateFile')
.addEventListener('change',async function(e){

    const file = e.target.files[0];

    if(!file) return;

    const data = await file.arrayBuffer();

    templateWorkbook = XLSX.read(data);

    saveTemplate(data,file.name);

    document.getElementById('templateStatus')
    .innerText =
        'Loaded: ' + file.name;
});

let searchTimeout;

document.getElementById('searchBox')
.addEventListener('input',function(){

    clearTimeout(searchTimeout);

    const value =
        this.value.toLowerCase().trim();

    searchTimeout = setTimeout(()=>{

        if(!value){

            matchedRows = [];

            renderMatches();

            return;
        }

        const tokens =
            value
            .split(' ')
            .filter(t => t.trim() !== '');

        matchedRows =
            masterData.filter(row=>{

                const zone =
                    row.zone.toLowerCase();

                const code =
                    row.code.toLowerCase();

                return tokens.every(token =>

                    zone.includes(token) ||

                    code.includes(token)
                );
            });

        renderMatches();

        if(matchedRows.length === 1){

            const zoneKey =
                matchedRows[0]
                .zone
                .toLowerCase();

            const saved =
                zonePeriods[zoneKey];

            if(saved){

                document.getElementById(
                    'initialPeriod'
                ).value = saved.initial;

                document.getElementById(
                    'recurringPeriod'
                ).value = saved.recurring;

            }else{

                document.getElementById(
                    'initialPeriod'
                ).value = 1;

                document.getElementById(
                    'recurringPeriod'
                ).value = 1;
            }
        }

    },150);
});

document.getElementById('addBtn')
.addEventListener('click',function(){

    const rate =
        document.getElementById('rate').value;

    if(!rate){

        alert('Please enter rate');

        return;
    }

    const effectiveDate =
        document.getElementById(
            'effectiveDate'
        ).value;

    matchedRows.forEach(row=>{

        const exists =
            exportRows.find(x=>

                x.zone === row.zone &&

                x.code === row.code
            );

        if(exists) return;

        const saved =
            zonePeriods[
                row.zone.toLowerCase()
            ];

        let initial = 1;

        let recurring = 1;

        if(saved){

            initial = saved.initial;

            recurring = saved.recurring;

        }else{

            initial =
                document.getElementById(
                    'initialPeriod'
                ).value;

            recurring =
                document.getElementById(
                    'recurringPeriod'
                ).value;

            saveZonePeriod(
                row.zone,
                initial,
                recurring
            );
        }

        exportRows.push({

            zone:row.zone,

            code:row.code,

            rate,

            effectiveDate,

            initial,

            recurring
        });

    });

    renderPreview();
});

document.getElementById('clearMatchesBtn')
.addEventListener('click',function(){

    matchedRows = [];

    document.getElementById('searchBox').value='';

    renderMatches();
});

document.getElementById('clearAllBtn')
.addEventListener('click',function(){

    exportRows = [];

    renderPreview();
});

document.getElementById('exportBtn')
.addEventListener('click',function(){

    if(!templateWorkbook){

        alert('Please upload template');

        return;
    }

    const wb = templateWorkbook;

    const ws =
        wb.Sheets[
            wb.SheetNames[0]
        ];

    let startRow = 17;

    exportRows.forEach((r,index)=>{

        const row = startRow + index;

        ws['A'+row] = {
            t:'s',
            v:r.zone
        };

        ws['B'+row] = {
            t:'s',
            v:r.code
        };

        ws['C'+row] = {
            t:'n',
            v:Number(r.rate)
        };

        ws['D'+row] = {
            t:'s',
            v:''
        };

        ws['E'+row] = {
            t:'s',
            v:formatDate(r.effectiveDate)
        };

        ws['F'+row] = {
            t:'n',
            v:Number(r.initial)
        };

        ws['G'+row] = {
            t:'n',
            v:Number(r.recurring)
        };

    });

    XLSX.writeFile(
        wb,
        'Voice_Ratesheet.xlsx'
    );
});

updateStats();

</script>

</body>
</html>
